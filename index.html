<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VelocityDL</title>
    <style>
      html, body {
        background-color: #0F0F0F !important;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      #startup-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 50% 20%, #1a1a1a 0%, #0f0f0f 55%, #0b0b0b 100%);
        opacity: 1;
        transition: opacity 260ms ease;
      }
      #startup-splash.is-hiding {
        opacity: 0;
        pointer-events: none;
      }
      .startup-splash-inner {
        width: min(360px, 82vw);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }
      .startup-logo {
        width: 54px;
        height: 54px;
        border-radius: 12px;
      }
      .startup-title {
        color: #f7f7f7;
        font-family: "Inter", "Segoe UI", sans-serif;
        font-size: 14px;
        letter-spacing: 0.08em;
      }
      .startup-bar {
        width: 100%;
        height: 8px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        overflow: hidden;
      }
      .startup-bar-fill {
        width: 12%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #3f8ef2, #6ab7ff);
        box-shadow: 0 0 14px rgba(79, 158, 255, 0.65);
        transition: width 180ms ease;
      }
    </style>
  </head>

  <body>
    <div id="startup-splash">
      <div class="startup-splash-inner">
        <img src="/favicon.png" alt="VelocityDL" class="startup-logo" />
        <div class="startup-title">VELOCITYDL</div>
        <div class="startup-bar">
          <div id="startup-bar-fill" class="startup-bar-fill"></div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
