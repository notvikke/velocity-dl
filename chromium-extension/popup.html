<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VelocityDL</title>
    <style>
      :root {
        --bg: #0b0f16;
        --panel: #131925;
        --panel-strong: #182133;
        --line: #263044;
        --text: #f4f7fb;
        --muted: #8f9cb0;
        --ok: #20c47a;
        --warn: #f0b24d;
        --btn: #2f89ff;
        --btn-soft: #334564;
        --btn-off: #374357;
        --btn-on: #1e9b63;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 328px;
        background: var(--bg);
        color: var(--text);
        font: 13px/1.4 "Segoe UI", Arial, sans-serif;
      }
      .wrap { padding: 14px; }
      .head {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 12px;
      }
      .head img {
        width: 30px;
        height: 30px;
        border-radius: 10px;
        box-shadow: 0 10px 22px rgba(47, 137, 255, 0.18);
      }
      .title { font-weight: 700; font-size: 15px; }
      .sub { color: var(--muted); font-size: 11px; margin-top: 2px; }
      .mono { font-family: Consolas, "Courier New", monospace; font-size: 10px; color: var(--muted); margin-top: 2px; }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        margin-bottom: 12px;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
      }
      .row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 0;
      }
      .row + .row { border-top: 1px solid var(--line); }
      .label { font-weight: 600; font-size: 12px; letter-spacing: 0.01em; }
      .desc { color: var(--muted); font-size: 11px; margin-top: 2px; }
      .row-main { flex: 1; min-width: 0; }
      .row-state {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 36px;
        margin-top: 2px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .toggle {
        position: relative;
        width: 36px;
        height: 20px;
        border-radius: 999px;
        background: #5f6778;
        cursor: pointer;
        border: 0;
      }
      .toggle::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        transition: transform 120ms ease;
      }
      .toggle.on { background: var(--ok); }
      .toggle.on::after { transform: translateX(16px); }
      .actions {
        display: grid;
        gap: 8px;
        margin-bottom: 12px;
      }
      .btn {
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 11px 12px;
        font-weight: 700;
        color: #fff;
        background: var(--btn);
        cursor: pointer;
        transition: background 120ms ease, transform 120ms ease, opacity 120ms ease;
      }
      .btn:hover { transform: translateY(-1px); }
      .btn:disabled { opacity: 0.6; cursor: default; }
      .btn.secondary { background: var(--btn-soft); }
      .btn.scan.off { background: var(--btn-off); }
      .btn.scan.on { background: var(--btn-on); }
      .btn-meta {
        display: block;
        margin-top: 2px;
        color: rgba(255,255,255,0.72);
        font-size: 11px;
        font-weight: 500;
      }
      .status {
        margin-top: 2px;
        font-size: 11px;
        color: var(--muted);
        min-height: 16px;
      }
      .ok { color: var(--ok); }
      .warn { color: var(--warn); }
      details.panel {
        padding-bottom: 10px;
      }
      details > summary {
        cursor: pointer;
        list-style: none;
        font-weight: 600;
        font-size: 12px;
        color: var(--text);
      }
      details > summary::-webkit-details-marker { display: none; }
      details > summary::after {
        content: "Show";
        float: right;
        color: var(--muted);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      details[open] > summary::after { content: "Hide"; }
      .debug-block {
        margin-top: 8px;
      }
      .foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 4px;
      }
      .link {
        color: #9cc0ff;
        text-decoration: none;
        font-size: 11px;
      }
      .link:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <img src="icons/icon-32.png" alt="VelocityDL" />
        <div>
          <div class="title">VelocityDL Bridge</div>
          <div class="sub" id="nativeState">Checking native host...</div>
          <div class="mono" id="runtimeId"></div>
        </div>
      </div>

      <div class="panel">
        <div class="row">
          <div class="row-main">
            <div class="label">Take Over Downloads</div>
            <div class="desc">Redirect browser downloads to VelocityDL</div>
          </div>
          <div>
            <div class="row-state" id="takeoverState">Off</div>
            <button class="toggle" id="takeoverToggle" type="button" aria-label="Take over downloads"></button>
          </div>
        </div>
        <div class="row">
          <div class="row-main">
            <div class="label">Context Menus</div>
            <div class="desc">Show right-click download actions</div>
          </div>
          <div>
            <div class="row-state" id="menuState">Off</div>
            <button class="toggle" id="menuToggle" type="button" aria-label="Context menus"></button>
          </div>
        </div>
        <div class="row">
          <div class="row-main">
            <div class="label">Auto-open Quality Picker</div>
            <div class="desc">Scan button opens in-app quality picker by default</div>
          </div>
          <div>
            <div class="row-state" id="scanPickerState">Off</div>
            <button class="toggle" id="scanPickerToggle" type="button" aria-label="Auto-open quality picker"></button>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btn scan off" id="scanBtn" type="button">
          Scan Overlay Off
          <span class="btn-meta" id="scanBtnMeta">Enable capture controls on the current tab</span>
        </button>
        <button class="btn secondary" id="copyDebugBtn" type="button">Copy Extension Diagnostics</button>
      </div>
      <div class="status" id="status"></div>

      <details class="panel">
        <summary>Debug Details</summary>
        <div class="debug-block">
          <div class="desc" id="debugSummary">No scan capture recorded yet.</div>
          <div class="mono" id="debugDetails" style="white-space: pre-wrap; max-height: 160px; overflow: auto; margin-top: 8px;"></div>
        </div>
      </details>

      <div class="foot">
        <a class="link" href="#" id="openOptions">Advanced options</a>
      </div>
    </div>
    <script src="popup.js" type="module"></script>
  </body>
  </html>
